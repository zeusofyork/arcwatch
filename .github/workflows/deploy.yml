###############################################################################
# ArcWatch — Deploy to AWS EC2 (arcwatch.arcusautomate.com)
#
# Triggers: push to master after CI passes
# Strategy: zip → S3 → SSM runs scripts/server-deploy.sh
# SSL: terminated at ALB — nginx on EC2 does HTTP only
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   ARCWATCH_SECRET_KEY       — Django SECRET_KEY for production
#   ARCWATCH_DB_PASSWORD      — Postgres password for production
###############################################################################

name: Deploy to AWS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION:   us-east-1
  EC2_INSTANCE: i-086907a005452300c
  S3_BUCKET:    pbs-production-static-36f9d155

jobs:
  deploy:
    name: Deploy arcwatch.arcusautomate.com
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create release zip
        run: |
          zip -r arcwatch.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.env*" \
            --exclude "db.sqlite3" \
            --exclude "staticfiles/*" \
            --exclude "*.log"
          echo "Zip size: $(du -h arcwatch.zip | cut -f1)"
          echo "RELEASE_KEY=releases/arcwatch-${{ github.sha }}.zip" >> "$GITHUB_ENV"

      - name: Upload release to S3
        run: aws s3 cp arcwatch.zip "s3://${{ env.S3_BUCKET }}/${{ env.RELEASE_KEY }}"

      - name: Upload env file to S3
        env:
          ARCWATCH_SECRET_KEY: ${{ secrets.ARCWATCH_SECRET_KEY }}
          ARCWATCH_DB_PASSWORD: ${{ secrets.ARCWATCH_DB_PASSWORD }}
        run: |
          cat > /tmp/arcwatch.env.prod << ENVEOF
          SECRET_KEY=$ARCWATCH_SECRET_KEY
          DEBUG=False
          ALLOWED_HOSTS=arcwatch.arcusautomate.com,localhost
          POSTGRES_DB=arcwatch
          POSTGRES_USER=arcwatch
          POSTGRES_PASSWORD=$ARCWATCH_DB_PASSWORD
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379/0
          ENVEOF
          aws s3 cp /tmp/arcwatch.env.prod "s3://${{ env.S3_BUCKET }}/config/arcwatch.env.prod" \
            --sse aws:kms
          rm /tmp/arcwatch.env.prod

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "echo === Download release ===",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.RELEASE_KEY }} /tmp/arcwatch-release.zip --region ${{ env.AWS_REGION }} || { echo DOWNLOAD FAILED; exit 1; }",
              "echo === Extract ===",
              "rm -rf /tmp/arcwatch-extract && mkdir /tmp/arcwatch-extract",
              "unzip -q /tmp/arcwatch-release.zip -d /tmp/arcwatch-extract || { echo UNZIP FAILED; exit 1; }",
              "echo === Sync files ===",
              "mkdir -p /opt/arcwatch/app",
              "rsync -a --delete /tmp/arcwatch-extract/ /opt/arcwatch/app/ --exclude .env.prod || { echo RSYNC FAILED; exit 1; }",
              "chmod +x /opt/arcwatch/app/scripts/server-deploy.sh",
              "echo === Run deploy script ===",
              "bash /opt/arcwatch/app/scripts/server-deploy.sh 2>&1",
              "rm -rf /tmp/arcwatch-extract /tmp/arcwatch-release.zip",
              "echo === Done ==="
            ]' \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE }}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Status" --output text)

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StandardOutputContent" --output text)

          ERRORS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StandardErrorContent" --output text)

          echo "────── STDOUT ──────"
          echo "$OUTPUT"
          if [ -n "$ERRORS" ]; then
            echo "────── STDERR ──────"
            echo "$ERRORS"
          fi
          echo "────── STATUS: $STATUS ──────"

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed: $STATUS"
            exit 1
          fi
          echo "Deployed successfully"

      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://arcwatch.arcusautomate.com/ 2>/dev/null || echo "000")
          echo "Health check: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "Site returned $STATUS — check SSM output above for errors"
            exit 1
          fi
