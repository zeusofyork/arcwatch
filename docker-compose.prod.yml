version: '3.9'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arcwatch}
      POSTGRES_USER: ${POSTGRES_USER:-arcwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcwatch} -d ${POSTGRES_DB:-arcwatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build: .
    command: python manage.py migrate --noinput
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  web:
    build: .
    command: gunicorn arcwatch.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    ports:
      - "8001:8000"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  celery:
    build: .
    command: celery -A arcwatch worker --loglevel=info --concurrency=2
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A arcwatch beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
