{% extends "monitor/base.html" %}
{% block content %}
<div style="display:flex;min-height:calc(100vh - 60px)">

  <!-- Sidebar -->
  <nav style="width:180px;border-right:1px solid #1e293b;padding:20px 0;flex-shrink:0;background:#0f172a">
    <div style="padding:0 16px 12px;font-size:.65rem;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;color:#475569">Settings</div>
    <a href="/settings/api-keys/"
       style="display:block;padding:8px 16px;font-size:.78rem;text-decoration:none;{% if active_tab == 'api-keys' %}background:rgba(118,185,0,.08);border-left:2px solid #76B900;color:#e2e8f0{% else %}color:#64748b;border-left:2px solid transparent{% endif %}">
      &#128273; API Keys
    </a>
    <a href="/settings/alert-rules/"
       style="display:block;padding:8px 16px;font-size:.78rem;text-decoration:none;{% if active_tab == 'alert-rules' %}background:rgba(118,185,0,.08);border-left:2px solid #76B900;color:#e2e8f0{% else %}color:#64748b;border-left:2px solid transparent{% endif %}">
      &#128276; Alert Rules
    </a>
    <a href="/settings/resources/"
       style="display:block;padding:8px 16px;font-size:.78rem;text-decoration:none;{% if active_tab == 'resources' %}background:rgba(118,185,0,.08);border-left:2px solid #76B900;color:#e2e8f0{% else %}color:#64748b;border-left:2px solid transparent{% endif %}">
      &#128421; Resources
    </a>
    <a href="/settings/members/"
       style="display:block;padding:8px 16px;font-size:.78rem;text-decoration:none;{% if active_tab == 'members' %}background:rgba(118,185,0,.08);border-left:2px solid #76B900;color:#e2e8f0{% else %}color:#64748b;border-left:2px solid transparent{% endif %}">
      &#128101; Members
    </a>
    <a href="/settings/llm-providers/"
       style="display:block;padding:8px 16px;font-size:.78rem;text-decoration:none;{% if active_tab == 'llm-providers' %}background:rgba(118,185,0,.08);border-left:2px solid #76B900;color:#e2e8f0{% else %}color:#64748b;border-left:2px solid transparent{% endif %}">
      🤖 LLM APIs
    </a>
  </nav>

  <!-- Content area -->
  <div style="flex:1;padding:28px;overflow-y:auto">
    {% block settings_content %}{% endblock %}
  </div>

</div>
{% endblock %}
