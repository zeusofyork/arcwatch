<!DOCTYPE html>
<html lang="en" data-theme="dark" data-scheme="gpu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ArcWatch{% endblock %} — GPU Fleet Monitor</title>
<meta name="description" content="ArcWatch — Real-time AI/ML GPU fleet monitoring. Track utilization, temperature, power draw, and inference workloads across your entire GPU infrastructure.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Crect x='4' y='10' width='24' height='12' rx='3' fill='none' stroke='%2376B900' stroke-width='2'/%3E%3Crect x='8' y='13' width='4' height='6' rx='1' fill='%2376B900'/%3E%3Crect x='14' y='13' width='4' height='6' rx='1' fill='%2376B900'/%3E%3Crect x='20' y='13' width='4' height='6' rx='1' fill='%2376B900'/%3E%3Crect x='10' y='7' width='2' height='3' rx='1' fill='%2376B900'/%3E%3Crect x='16' y='7' width='2' height='3' rx='1' fill='%2376B900'/%3E%3Crect x='22' y='7' width='2' height='3' rx='1' fill='%2376B900'/%3E%3Crect x='10' y='22' width='2' height='3' rx='1' fill='%2376B900'/%3E%3Crect x='16' y='22' width='2' height='3' rx='1' fill='%2376B900'/%3E%3Crect x='22' y='22' width='2' height='3' rx='1' fill='%2376B900'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ── Design System: Spacing & Typography Scales ── */
:root{
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;
  --space-6:32px;--space-7:48px;--space-8:64px;--space-9:96px;
  --text-xs:0.6875rem;--text-sm:0.8125rem;--text-base:0.9375rem;--text-md:1.0625rem;
  --text-lg:1.25rem;--text-xl:1.5rem;--text-2xl:1.875rem;--text-3xl:2.25rem;--text-4xl:3rem;
  /* Grade colours */
  --grade-a:#4ade80;--grade-b:#60a5fa;--grade-c:#fbbf24;--grade-d:#f97316;--grade-f:#f87171;
  /* Severity */
  --sev-critical:#f87171;--sev-high:#fb923c;--sev-medium:#fbbf24;--sev-low:#60a5fa;--sev-pass:#4ade80;
}

/* ── Dark base (always on) ── */
:root,[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263447;--border:rgba(255,255,255,0.08);
  --text:#cbd5e1;--text-dim:#64748b;--text-bright:#f1f5f9;
  --nav-bg:rgba(15,23,42,0.97);--input-bg:#1e293b;
  --shadow:0 4px 24px rgba(0,0,0,.3);--warn:#f59e0b;--danger:#ef4444;
  --mono:'Share Tech Mono',monospace;--head:'Barlow Condensed',sans-serif;
}

/* ── GPU scheme (NVIDIA green + cyan) ── */
[data-scheme="gpu"][data-theme="dark"]{
  --accent:#76B900;
  --accent2:#00D4AA;
  --grid:rgba(118,185,0,.025);
}

/* ── Base reset ── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;
}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px;position:relative}

/* ── Nav ── */
nav{
  background:var(--nav-bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(12px);
}
.nav-inner{
  display:flex;align-items:center;
  justify-content:space-between;
  height:56px;gap:0;
}
.logo-wrap{display:flex;align-items:center;padding-right:32px;flex-shrink:0}
.logo{
  display:flex;align-items:center;gap:10px;
  font-size:1.15rem;font-weight:700;color:var(--text-bright);
  text-decoration:none;font-family:var(--head);letter-spacing:.04em;
  text-transform:uppercase;
}
.logo-icon{
  width:30px;height:30px;background:var(--accent);
  border-radius:7px;display:flex;align-items:center;
  justify-content:center;color:#0f172a;font-size:.85rem;flex-shrink:0;
}
.logo-text em{color:var(--accent);font-style:normal;font-weight:900}
.logo-badge{
  font-size:.6rem;color:var(--text-dim);
  letter-spacing:.06em;margin-top:1px;
  font-weight:400;font-family:var(--mono);
  background:rgba(118,185,0,.1);border:1px solid rgba(118,185,0,.2);
  border-radius:3px;padding:1px 5px;
}

/* Nav menu */
.nav-menu{display:flex;align-items:stretch;flex:1;gap:0}
.nav-item{position:relative;display:flex;align-items:stretch}
.nav-item > a{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;
  font-size:.82rem;font-weight:600;
  font-family:var(--head);letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-dim);text-decoration:none;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.nav-item > a:hover,.nav-item > a.active{
  color:var(--text-bright);border-bottom-color:var(--accent);
}
.nav-item > a.active{color:var(--accent)}

/* Right controls */
.nav-right{display:flex;align-items:center;gap:8px}
.nav-pill{
  font-size:.68rem;font-weight:600;font-family:var(--mono);
  padding:4px 10px;border-radius:4px;letter-spacing:.04em;
  background:rgba(118,185,0,.1);border:1px solid rgba(118,185,0,.25);
  color:var(--accent);
}
.pulse-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent2);
  display:inline-block;margin-right:5px;
  animation:livePulse 2s ease infinite;
}
@keyframes livePulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,170,.4)}
  50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,212,170,0)}
}

/* ── Page header ── */
.page-header{
  padding:28px 0 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
}
.page-header h1{
  font-family:var(--head);font-size:1.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:var(--text-bright);
  display:flex;align-items:center;gap:12px;
}
.page-header h1 .icon{color:var(--accent);font-size:1.4rem}
.page-header p{
  font-size:.85rem;color:var(--text-dim);margin-top:6px;
}

/* ── Stat strip / KPI tiles ── */
.stat-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:24px;
}
.stat-tile{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px 18px;
  position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.stat-tile:hover{
  border-color:rgba(118,185,0,.3);
  box-shadow:0 0 0 1px rgba(118,185,0,.1),var(--shadow);
}
.stat-tile::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:.6;
}
.stat-tile.accent2::before{background:var(--accent2)}
.stat-tile.warn::before{background:var(--warn)}
.stat-tile.danger::before{background:var(--danger)}
.stat-label{
  font-size:.68rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-dim);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.stat-value{
  font-family:var(--mono);font-size:1.75rem;font-weight:400;
  color:var(--text-bright);line-height:1;
}
.stat-value.big{font-size:2.1rem}
.stat-sub{
  font-size:.72rem;color:var(--text-dim);margin-top:4px;
}
.stat-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:1.6rem;color:var(--accent);opacity:.18;
}
.stat-tile.accent2 .stat-icon{color:var(--accent2)}
.stat-tile.warn .stat-icon{color:var(--warn)}
.stat-tile.danger .stat-icon{color:var(--danger)}

/* ── Card grid ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.section-title{
  font-family:var(--head);font-size:1rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--text-bright);
  display:flex;align-items:center;gap:8px;
}
.section-title::after{
  content:'';display:inline-block;width:40px;height:2px;
  background:var(--accent);border-radius:2px;opacity:.5;
}
.badge{
  font-size:.68rem;font-weight:600;font-family:var(--mono);
  padding:2px 8px;border-radius:4px;
  background:rgba(118,185,0,.1);border:1px solid rgba(118,185,0,.2);
  color:var(--accent);
}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
  margin-bottom:32px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;
  transition:border-color .2s,transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.card:hover{
  border-color:rgba(118,185,0,.35);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 0 1px rgba(118,185,0,.1);
}
.card-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:14px;
}
.card-title{
  font-family:var(--head);font-size:1rem;font-weight:700;
  color:var(--text-bright);letter-spacing:.04em;
}
.card-subtitle{
  font-size:.72rem;color:var(--text-dim);margin-top:2px;font-family:var(--mono);
}
.card-status{
  font-size:.65rem;font-weight:600;font-family:var(--mono);
  padding:3px 8px;border-radius:4px;white-space:nowrap;
  text-transform:uppercase;letter-spacing:.04em;
}
.status-healthy{
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);
  color:#4ade80;
}
.status-degraded{
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);
  color:#fbbf24;
}
.status-unreachable{
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);
  color:#f87171;
}

/* ── Metric rows in GPU card ── */
.metric-rows{display:flex;flex-direction:column;gap:7px}
.metric-row{
  display:flex;align-items:center;
  justify-content:space-between;
  font-size:.8rem;
}
.metric-label{
  color:var(--text-dim);display:flex;align-items:center;gap:6px;
  font-size:.75rem;
}
.metric-label i{width:14px;text-align:center;font-size:.72rem}
.metric-val{
  font-family:var(--mono);font-size:.82rem;
  color:var(--text-bright);font-weight:400;
}
.metric-val.hi{color:#f87171}
.metric-val.mid{color:#fbbf24}
.metric-val.ok{color:#4ade80}

/* ── Utilization bar ── */
.util-bar-wrap{margin-top:12px}
.util-bar-label{
  display:flex;justify-content:space-between;
  font-size:.7rem;margin-bottom:4px;
}
.util-bar-label span:first-child{color:var(--text-dim);font-family:var(--head);text-transform:uppercase;letter-spacing:.06em}
.util-bar-label span:last-child{font-family:var(--mono);color:var(--text-bright)}
.util-bar{
  height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;
}
.util-bar-fill{
  height:100%;border-radius:3px;
  transition:width .4s ease;
}
.util-bar-fill.hi{background:linear-gradient(90deg,#f97316,#f87171)}
.util-bar-fill.mid{background:linear-gradient(90deg,#d97706,#fbbf24)}
.util-bar-fill.ok{background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* ── Model tag ── */
.model-tag{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:10px;
  font-size:.7rem;font-family:var(--mono);
  background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);
  color:var(--accent2);padding:3px 8px;border-radius:4px;
}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:64px 24px;
}
.empty-state-icon{
  font-size:3rem;color:var(--text-dim);opacity:.4;margin-bottom:16px;
}
.empty-state-title{
  font-family:var(--head);font-weight:700;font-size:1.2rem;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-dim);margin-bottom:8px;
}
.empty-state-desc{
  font-size:.85rem;color:var(--text-dim);
  max-width:420px;margin:0 auto 20px;line-height:1.6;
}
.empty-state-cmd{
  display:inline-block;
  font-family:var(--mono);font-size:.8rem;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--accent);padding:10px 20px;border-radius:8px;
}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;font-weight:600;font-size:.82rem;
  font-family:var(--head);letter-spacing:.06em;text-transform:uppercase;
  border:none;cursor:pointer;text-decoration:none;
  transition:all .2s;border-radius:8px;
}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 6px 20px rgba(118,185,0,.3)}
.btn-ghost{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text-dim);
}
.btn-ghost:hover{border-color:var(--accent);color:var(--text-bright);background:rgba(118,185,0,.06)}
.btn-sm{padding:5px 13px;font-size:.74rem}

/* ── Section divider label ── */
.sec-label{
  font-size:.72rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-dim);
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Alert / flash messages ── */
.alert{
  padding:12px 18px;border-radius:8px;font-size:.85rem;
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.alert-success{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:#4ade80}
.alert-warning{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fbbf24}
.alert-danger{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#f87171}
.alert-info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#60a5fa}

/* ── Footer ── */
footer{
  border-top:1px solid var(--border);margin-top:48px;
  padding:20px 0;
}
.footer-inner{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.75rem;color:var(--text-dim);
}
.footer-inner a{color:var(--text-dim);text-decoration:none}
.footer-inner a:hover{color:var(--accent)}

/* ── Responsive ── */
@media(max-width:768px){
  .wrap{padding:0 16px}
  .nav-menu{display:none}
  .stat-strip{grid-template-columns:repeat(2,1fr)}
  .card-grid{grid-template-columns:1fr}
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <div class="wrap">
    <div class="nav-inner">
      <div class="logo-wrap">
        <a class="logo" href="{% url 'monitor:gpu_fleet_dashboard' %}">
          <div class="logo-icon"><i class="fas fa-microchip"></i></div>
          <div>
            <div class="logo-text">GPU<em>Watch</em></div>
          </div>
        </a>
        <span class="logo-badge" style="margin-left:10px">LIVE</span>
      </div>

      <nav class="nav-menu">
        <div class="nav-item">
          <a href="{% url 'monitor:gpu_fleet_dashboard' %}"
             class="{% block nav_fleet %}{% endblock %}">
            <i class="fas fa-server"></i> Fleet
          </a>
        </div>
        <div class="nav-item">
          <a href="{% url 'monitor:inference_dashboard' %}" class="{% block nav_inference %}{% endblock %}">
            <i class="fas fa-brain"></i> Inference
          </a>
        </div>
        <div class="nav-item">
          <a href="{% url 'monitor:cost_dashboard' %}" class="{% block nav_costs %}{% endblock %}">
            <i class="fas fa-dollar-sign"></i> Costs
          </a>
        </div>
        <div class="nav-item">
          <a href="{% url 'monitor:alerts_dashboard' %}" class="{% block nav_alerts %}{% endblock %}">
            <i class="fas fa-bell"></i> Alerts
          </a>
        </div>
      </nav>

      <div class="nav-right">
        <div class="nav-pill">
          <span class="pulse-dot"></span>LIVE
        </div>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="wrap" style="padding-top:24px;padding-bottom:48px">
    {% block content %}{% endblock %}
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="footer-inner">
      <span>ArcWatch &copy; 2025</span>
      <span style="font-family:var(--mono);font-size:.68rem;color:var(--text-dim)">
        <i class="fas fa-microchip" style="color:var(--accent);margin-right:4px"></i>AI/ML GPU Fleet Monitor
      </span>
    </div>
  </div>
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
